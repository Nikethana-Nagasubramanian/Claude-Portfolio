<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>After: onboarding explains what Charlie is before the first message</title>
  <desc>User signs up, then goes through onboarding that explains what Charlie does and how it protects data, that Charlie isn't an LLM itself, and how data masking works, before reaching the chat window confident and unconfused.</desc>

  <rect x="0" y="0" width="900" height="340" fill="#FAFAF8"/>
  <text x="30" y="30" font-family="JetBrains Mono, monospace" font-size="12" font-weight="500" letter-spacing="1.5" fill="#15803d">AFTER</text>

  <rect x="30" y="130" width="150" height="64" rx="6" fill="#ffffff" stroke="#e4e2dc" stroke-width="1.5"/>
  <text x="105" y="167" font-family="Instrument Sans, sans-serif" font-size="15" fill="#141414" text-anchor="middle">User signs up</text>

  <line x1="180" y1="162" x2="228" y2="162" stroke="#141414" stroke-width="1.5"/>
  <polygon points="228,162 218,157 218,167" fill="#141414"/>

  <rect x="230" y="45" width="340" height="260" rx="10" fill="none" stroke="#3f7ff4" stroke-width="1.25" stroke-dasharray="5 4"/>
  <text x="400" y="72" font-family="JetBrains Mono, monospace" font-size="12" font-weight="500" letter-spacing="1" fill="#3f7ff4" text-anchor="middle">ONBOARDING</text>

  <rect x="254" y="88" width="292" height="56" rx="6" fill="#3f7ff4" fill-opacity="0.06" stroke="#3f7ff4" stroke-opacity="0.4" stroke-width="1.25"/>
  <text x="400" y="112" font-family="Instrument Sans, sans-serif" font-size="13.5" fill="#1f4fa8" text-anchor="middle">Explains what Charlie does</text>
  <text x="400" y="130" font-family="Instrument Sans, sans-serif" font-size="13.5" fill="#1f4fa8" text-anchor="middle">and how it protects your data</text>

  <rect x="254" y="156" width="292" height="40" rx="6" fill="#3f7ff4" fill-opacity="0.06" stroke="#3f7ff4" stroke-opacity="0.4" stroke-width="1.25"/>
  <text x="400" y="180" font-family="Instrument Sans, sans-serif" font-size="13.5" fill="#1f4fa8" text-anchor="middle">Explains that Charlie isn't an LLM itself</text>

  <rect x="254" y="208" width="292" height="56" rx="6" fill="#3f7ff4" fill-opacity="0.06" stroke="#3f7ff4" stroke-opacity="0.4" stroke-width="1.25"/>
  <text x="400" y="232" font-family="Instrument Sans, sans-serif" font-size="13.5" fill="#1f4fa8" text-anchor="middle">Explains how data masking works</text>
  <text x="400" y="250" font-family="Instrument Sans, sans-serif" font-size="13.5" fill="#1f4fa8" text-anchor="middle">and how Charlie applies it</text>

  <line x1="570" y1="162" x2="618" y2="162" stroke="#141414" stroke-width="1.5"/>
  <polygon points="618,162 608,157 608,167" fill="#141414"/>

  <rect x="620" y="130" width="250" height="64" rx="6" fill="#ffffff" stroke="#e4e2dc" stroke-width="1.5"/>
  <text x="745" y="158" font-family="Instrument Sans, sans-serif" font-size="15" fill="#141414" text-anchor="middle">Reaches the chat window</text>
  <text x="745" y="178" font-family="Instrument Sans, sans-serif" font-size="15" fill="#141414" text-anchor="middle">already confident</text>

  <line x1="745" y1="194" x2="745" y2="216" stroke="#7fb896" stroke-width="1.5" stroke-dasharray="3 3"/>

  <rect x="600" y="224" width="290" height="66" rx="8" fill="#15803d" fill-opacity="0.06" stroke="#15803d" stroke-opacity="0.35" stroke-width="1.25" stroke-dasharray="4 3"/>
  <text x="745" y="250" font-family="Instrument Sans, sans-serif" font-size="14" fill="#1e6b3f" text-anchor="middle">"Okay — I can ask Charlie anything,</text>
  <text x="745" y="269" font-family="Instrument Sans, sans-serif" font-size="14" fill="#1e6b3f" text-anchor="middle">it'll hide my sensitive data"</text>
</svg>
